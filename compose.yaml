# mkdir -p ./output/data/input/my_scene && cp testdata/sample_scene/view*.mp4 ./output/data/input/my_scene 

services:
  # Azure Blob Storage emulator for local development and E2E testing
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:10000/"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 2s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # CPU-only variant (default) — uses apt-installed COLMAP, CPU PyTorch
  3dgs-processor:
    image: 3dgs-processor:latest
    container_name: 3dgs-processor
    restart: unless-stopped
    depends_on:
      azurite:
        condition: service_healthy
    volumes:
      - ./output/data:/data
      - ./container-test/confg.yaml:/app/config.yaml:ro
      - ./output/tmp:/tmp/3dgs-work
    environment:
      CONFIG_PATH: /app/config.yaml
      INPUT_PATH: /data/input
      OUTPUT_PATH: /data/output
      PROCESSED_PATH: /data/processed
      ERROR_PATH: /data/error
      BACKEND: mock
      TEMP_PATH: /tmp/3dgs-work
      LOG_LEVEL: debug
      HEALTH_CHECK_ENABLED: "true"
      HEALTH_CHECK_PORT: 8080
      UPLOAD_STABILITY_TIMEOUT_SECS: 5
      MAX_RETRIES: 1
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # GPU variant — CUDA COLMAP, CUDA PyTorch, requires NVIDIA runtime
  # Start with: docker compose --profile gpu up 3dgs-processor-gpu
  3dgs-processor-gpu:
    image: 3dgs-processor:gpu-latest
    container_name: 3dgs-processor-gpu
    profiles: ["gpu"]
    restart: unless-stopped
    depends_on:
      azurite:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./output/data:/data
      - ./container-test/confg.yaml:/app/config.yaml:ro
      - ./output/tmp:/tmp/3dgs-work
    environment:
      CONFIG_PATH: /app/config.yaml
      INPUT_PATH: /data/input
      OUTPUT_PATH: /data/output
      PROCESSED_PATH: /data/processed
      ERROR_PATH: /data/error
      BACKEND: gsplat
      TEMP_PATH: /tmp/3dgs-work
      LOG_LEVEL: debug
      HEALTH_CHECK_ENABLED: "true"
      HEALTH_CHECK_PORT: 8080
      UPLOAD_STABILITY_TIMEOUT_SECS: 5
      MAX_RETRIES: 1
      NVIDIA_VISIBLE_DEVICES: all
    ports:
      - "8081:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  azurite-data: